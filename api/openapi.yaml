openapi: 3.1.0
info:
  title: Fleet Maintenance API
  description: |
    REST API for the Fleet Maintenance Process.
    Covers the full lifecycle: request creation, provider assignment,
    inspection & estimate submission, coordinator decision, and
    payment-readiness event publishing.

    References: docs/functional-requirements.md
    - §3 Domain Model
    - §4 Workflow & State Machine
    - §5 Use Cases (UC-1 through UC-5)
    - §6 Events & Integration
    - §9.3 API Naming Conventions
    - Appendix A & B
  version: 1.0.0
  contact:
    name: Fleet Maintenance Team

servers:
  - url: http://localhost:8080
    description: Local development
  - url: https://fleet-maintenance.example.com
    description: Production

tags:
  - name: Maintenance Requests
    description: Create, list, and view maintenance requests (UC-1, UC-2)
  - name: Assignments
    description: Assign service providers to requests (UC-2)
  - name: Inspections
    description: Submit and view inspection reports & estimates (UC-3)
  - name: Decisions
    description: Approve, reject, or request info on inspections (UC-4)
  - name: Events
    description: View Kafka domain events (UC-5, §6)
  - name: Service Providers
    description: List available service providers

paths:
  # ---------------------------------------------------------------------------
  # Maintenance Requests (UC-1)
  # ---------------------------------------------------------------------------
  /api/v1/maintenance-requests:
    post:
      operationId: createMaintenanceRequest
      summary: Create a new maintenance request
      description: |
        Creates a maintenance request in CREATED status.
        Publishes `maintenance.request.created` Kafka event. (UC-1)
      tags:
        - Maintenance Requests
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateRequestDto'
      responses:
        '201':
          description: Request created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RequestDto'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalServerError'

    get:
      operationId: listMaintenanceRequests
      summary: List maintenance requests with filters
      description: |
        Returns a paginated list of maintenance requests.
        Supports filtering by status, priority, and date range.
      tags:
        - Maintenance Requests
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/SizeParam'
        - $ref: '#/components/parameters/SortParam'
        - name: status
          in: query
          required: false
          schema:
            $ref: '#/components/schemas/RequestStatus'
        - name: priority
          in: query
          required: false
          schema:
            $ref: '#/components/schemas/Priority'
        - name: createdFrom
          in: query
          required: false
          schema:
            type: string
            format: date-time
        - name: createdTo
          in: query
          required: false
          schema:
            type: string
            format: date-time
      responses:
        '200':
          description: Paginated list of requests
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PagedRequestDto'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/v1/maintenance-requests/{requestId}:
    get:
      operationId: getMaintenanceRequest
      summary: Get maintenance request detail
      description: |
        Returns full request detail including assignment info,
        latest inspection report, and decision history.
      tags:
        - Maintenance Requests
      parameters:
        - $ref: '#/components/parameters/RequestIdPath'
      responses:
        '200':
          description: Request detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RequestDetailDto'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  # ---------------------------------------------------------------------------
  # Assignments (UC-2)
  # ---------------------------------------------------------------------------
  /api/v1/maintenance-requests/{requestId}/assignments:
    post:
      operationId: assignServiceProvider
      summary: Assign a service provider to a request
      description: |
        Assigns a service provider and transitions status from CREATED → ASSIGNED.
        Publishes `maintenance.request.assigned` Kafka event. (UC-2)

        Guards:
        - Request must be in CREATED status (§4.1)
        - Provider must exist and be active
      tags:
        - Assignments
      parameters:
        - $ref: '#/components/parameters/RequestIdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AssignProviderDto'
      responses:
        '200':
          description: Provider assigned successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RequestDto'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
        '500':
          $ref: '#/components/responses/InternalServerError'

  # ---------------------------------------------------------------------------
  # Inspections (UC-3)
  # ---------------------------------------------------------------------------
  /api/v1/maintenance-requests/{requestId}/inspections:
    post:
      operationId: submitInspection
      summary: Submit an inspection report and cost estimate
      description: |
        Submits inspection findings and estimate. Transitions status to INSPECTION_SUBMITTED.
        Publishes `maintenance.inspection.submitted` Kafka event. (UC-3)

        Guards:
        - Request must be in ASSIGNED or INFO_REQUESTED status (§4.1)
        - Report must include findings and estimate
      tags:
        - Inspections
      parameters:
        - $ref: '#/components/parameters/RequestIdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InspectionReportDto'
      responses:
        '201':
          description: Inspection submitted successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InspectionDto'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '500':
          $ref: '#/components/responses/InternalServerError'

    get:
      operationId: listInspections
      summary: List inspection reports for a request
      description: Returns all inspection report versions for the given request.
      tags:
        - Inspections
      parameters:
        - $ref: '#/components/parameters/RequestIdPath'
      responses:
        '200':
          description: List of inspections
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/InspectionDto'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  # ---------------------------------------------------------------------------
  # Decisions (UC-4)
  # ---------------------------------------------------------------------------
  /api/v1/maintenance-requests/{requestId}/decisions:
    post:
      operationId: submitDecision
      summary: Submit a decision (approve, reject, or request info)
      description: |
        Coordinator submits a decision on an inspection. (UC-4)

        State transitions (§4.1):
        - APPROVED  → status becomes APPROVED, then auto-transitions to PAYMENT_READY (UC-5)
        - REJECTED  → status becomes REJECTED (terminal)
        - INFO_REQUESTED → status becomes INFO_REQUESTED (provider re-submits)

        Publishes one of:
        - `maintenance.decision.approved`
        - `maintenance.decision.rejected`
        - `maintenance.decision.info-requested`

        On APPROVED, also publishes `maintenance.payment.ready`. (UC-5)

        Guards:
        - Request must be in INSPECTION_SUBMITTED status
        - Remarks required for REJECTED and INFO_REQUESTED outcomes
      tags:
        - Decisions
      parameters:
        - $ref: '#/components/parameters/RequestIdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DecisionRequestDto'
      responses:
        '201':
          description: Decision recorded successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DecisionDto'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '500':
          $ref: '#/components/responses/InternalServerError'

    get:
      operationId: listDecisions
      summary: List decisions for a request
      description: Returns the immutable decision audit trail for the given request.
      tags:
        - Decisions
      parameters:
        - $ref: '#/components/parameters/RequestIdPath'
      responses:
        '200':
          description: List of decisions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/DecisionDto'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  # ---------------------------------------------------------------------------
  # Events (§6)
  # ---------------------------------------------------------------------------
  /api/v1/events:
    get:
      operationId: listEvents
      summary: List recent Kafka domain events
      description: |
        Returns a paginated list of domain events for the Kafka Events Viewer UI (§8.1).
        Supports filtering by event type and date range.
      tags:
        - Events
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/SizeParam'
        - name: eventType
          in: query
          required: false
          schema:
            type: string
            enum:
              - maintenance.request.created
              - maintenance.request.assigned
              - maintenance.inspection.submitted
              - maintenance.decision.approved
              - maintenance.decision.rejected
              - maintenance.decision.info-requested
              - maintenance.payment.ready
        - name: since
          in: query
          required: false
          schema:
            type: string
            format: date-time
      responses:
        '200':
          description: Paginated list of events
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PagedEventDto'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

  # ---------------------------------------------------------------------------
  # Service Providers
  # ---------------------------------------------------------------------------
  /api/v1/service-providers:
    get:
      operationId: listServiceProviders
      summary: List active service providers
      description: Returns all active service providers available for assignment.
      tags:
        - Service Providers
      responses:
        '200':
          description: List of active providers
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ProviderDto'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

# =============================================================================
# Components
# =============================================================================
components:

  # ---------------------------------------------------------------------------
  # Parameters
  # ---------------------------------------------------------------------------
  parameters:
    RequestIdPath:
      name: requestId
      in: path
      required: true
      description: UUID of the maintenance request
      schema:
        type: string
        format: uuid

    PageParam:
      name: page
      in: query
      required: false
      description: Zero-based page index
      schema:
        type: integer
        default: 0
        minimum: 0

    SizeParam:
      name: size
      in: query
      required: false
      description: Page size
      schema:
        type: integer
        default: 20
        minimum: 1
        maximum: 100

    SortParam:
      name: sort
      in: query
      required: false
      description: "Sort field and direction (e.g., createdAt,desc)"
      schema:
        type: string

  # ---------------------------------------------------------------------------
  # Schemas
  # ---------------------------------------------------------------------------
  schemas:

    # --- Enums (§3, §4) ---

    RequestStatus:
      type: string
      description: "Maintenance request lifecycle status (§4 State Machine)"
      enum:
        - CREATED
        - ASSIGNED
        - INSPECTION_SUBMITTED
        - APPROVED
        - REJECTED
        - INFO_REQUESTED
        - PAYMENT_READY

    Priority:
      type: string
      description: "Request priority level (§3.2 MaintenanceRequest)"
      enum:
        - LOW
        - MEDIUM
        - HIGH
        - CRITICAL

    DecisionOutcome:
      type: string
      description: "Decision outcome (§3.2 Decision entity)"
      enum:
        - APPROVED
        - REJECTED
        - INFO_REQUESTED

    # --- Value Objects (§3.3) ---

    Money:
      type: object
      description: "Monetary value (§3.3 Value Objects)"
      required:
        - amount
        - currency
      properties:
        amount:
          type: number
          format: double
          minimum: 0
          example: 1500.00
        currency:
          type: string
          minLength: 3
          maxLength: 3
          example: USD

    VehicleRef:
      type: object
      description: "Vehicle reference (§3.3 Value Objects)"
      properties:
        vehicleId:
          type: string
          example: VH-001
        licensePlate:
          type: string
          example: ABC-1234
        make:
          type: string
          example: Ford
        model:
          type: string
          example: Transit

    # --- Request DTOs (Appendix B, UC-1) ---

    CreateRequestDto:
      type: object
      description: "Payload to create a maintenance request (Appendix B, UC-1)"
      required:
        - vehicleId
        - description
        - priority
      properties:
        vehicleId:
          type: string
          description: Fleet vehicle identifier
          example: VH-001
        description:
          type: string
          description: Description of the maintenance issue
          maxLength: 2000
          example: Front-left tire shows excessive wear and needs replacement.
        priority:
          $ref: '#/components/schemas/Priority'

    RequestDto:
      type: object
      description: "Maintenance request summary (§3.2 MaintenanceRequest)"
      properties:
        requestId:
          type: string
          format: uuid
        vehicleId:
          type: string
        description:
          type: string
        priority:
          $ref: '#/components/schemas/Priority'
        status:
          $ref: '#/components/schemas/RequestStatus'
        assignedProviderId:
          type: [string, "null"]
          format: uuid
        createdBy:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    RequestDetailDto:
      type: object
      description: "Full request detail with nested inspections and decisions"
      properties:
        requestId:
          type: string
          format: uuid
        vehicleId:
          type: string
        vehicle:
          $ref: '#/components/schemas/VehicleRef'
        description:
          type: string
        priority:
          $ref: '#/components/schemas/Priority'
        status:
          $ref: '#/components/schemas/RequestStatus'
        assignedProviderId:
          type: [string, "null"]
          format: uuid
        assignedProvider:
          $ref: '#/components/schemas/ProviderDto'
        inspections:
          type: array
          items:
            $ref: '#/components/schemas/InspectionDto'
        decisions:
          type: array
          items:
            $ref: '#/components/schemas/DecisionDto'
        createdBy:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    PagedRequestDto:
      type: object
      description: Paginated wrapper for maintenance requests
      properties:
        content:
          type: array
          items:
            $ref: '#/components/schemas/RequestDto'
        page:
          type: integer
        size:
          type: integer
        totalElements:
          type: integer
          format: int64
        totalPages:
          type: integer

    # --- Assignment DTOs (Appendix B, UC-2) ---

    AssignProviderDto:
      type: object
      description: "Payload to assign a service provider (Appendix B, UC-2)"
      required:
        - providerId
      properties:
        providerId:
          type: string
          format: uuid
          description: UUID of the service provider to assign

    # --- Inspection DTOs (Appendix B, UC-3) ---

    InspectionReportDto:
      type: object
      description: "Payload to submit an inspection report (Appendix B, UC-3)"
      required:
        - findings
        - estimatedCost
        - estimatedDurationDays
      properties:
        findings:
          type: string
          description: Detailed inspection findings
          maxLength: 5000
          example: Front-left tire tread depth at 1mm. Brake pads at 15% remaining.
        estimatedCost:
          type: number
          format: double
          description: Estimated repair cost
          minimum: 0
          example: 1500.00
        estimatedDurationDays:
          type: integer
          description: Estimated days to complete maintenance
          minimum: 1
          example: 3
        attachments:
          type: array
          description: Optional URLs to uploaded documents or images
          items:
            type: string
            format: uri

    InspectionDto:
      type: object
      description: "Inspection report response (§3.2 InspectionReport)"
      properties:
        reportId:
          type: string
          format: uuid
        requestId:
          type: string
          format: uuid
        findings:
          type: string
        estimatedCost:
          $ref: '#/components/schemas/Money'
        estimatedDurationDays:
          type: integer
        attachments:
          type: array
          items:
            type: string
            format: uri
        submittedBy:
          type: string
        submittedAt:
          type: string
          format: date-time

    # --- Decision DTOs (Appendix B, UC-4) ---

    DecisionRequestDto:
      type: object
      description: "Payload to submit a decision (Appendix B, UC-4)"
      required:
        - outcome
      properties:
        outcome:
          $ref: '#/components/schemas/DecisionOutcome'
        remarks:
          type: string
          description: Required for REJECTED and INFO_REQUESTED outcomes
          maxLength: 2000
          example: Please provide itemized cost breakdown for parts vs labor.

    DecisionDto:
      type: object
      description: "Decision response – immutable audit record (§3.2 Decision)"
      properties:
        decisionId:
          type: string
          format: uuid
        requestId:
          type: string
          format: uuid
        outcome:
          $ref: '#/components/schemas/DecisionOutcome'
        remarks:
          type: [string, "null"]
        decidedBy:
          type: string
        decidedAt:
          type: string
          format: date-time

    # --- Event DTOs (§6) ---

    EventDto:
      type: object
      description: "Domain event representation (§6.2 Common Envelope)"
      properties:
        eventId:
          type: string
          format: uuid
        eventType:
          type: string
          description: "Kafka topic name (§6.1)"
          enum:
            - maintenance.request.created
            - maintenance.request.assigned
            - maintenance.inspection.submitted
            - maintenance.decision.approved
            - maintenance.decision.rejected
            - maintenance.decision.info-requested
            - maintenance.payment.ready
        timestamp:
          type: string
          format: date-time
        correlationId:
          type: string
          format: uuid
        payload:
          type: object
          description: Event-specific payload
          additionalProperties: true

    PagedEventDto:
      type: object
      description: Paginated wrapper for domain events
      properties:
        content:
          type: array
          items:
            $ref: '#/components/schemas/EventDto'
        page:
          type: integer
        size:
          type: integer
        totalElements:
          type: integer
          format: int64
        totalPages:
          type: integer

    # --- Payment Event (§6.3, UC-5) ---

    PaymentReadinessEventPayload:
      type: object
      description: "Payment readiness event payload (§6.3)"
      required:
        - requestId
        - vehicleId
        - providerId
        - approvedCost
        - estimatedDurationDays
        - approvedBy
        - approvedAt
      properties:
        requestId:
          type: string
          format: uuid
        vehicleId:
          type: string
        providerId:
          type: string
          format: uuid
        approvedCost:
          $ref: '#/components/schemas/Money'
        estimatedDurationDays:
          type: integer
        approvedBy:
          type: string
        approvedAt:
          type: string
          format: date-time

    # --- Provider DTO ---

    ProviderDto:
      type: object
      description: Service provider summary
      properties:
        providerId:
          type: string
          format: uuid
        name:
          type: string
          example: AutoFix Services
        contactEmail:
          type: string
          format: email
        phone:
          type: string
        active:
          type: boolean

    # --- Error (NFR-4, RFC 7807) ---

    ProblemDetail:
      type: object
      description: "RFC 7807 Problem Detail for HTTP APIs (NFR-4)"
      required:
        - type
        - title
        - status
      properties:
        type:
          type: string
          format: uri
          description: URI reference identifying the problem type
          example: https://fleet-maintenance.example.com/problems/validation-error
        title:
          type: string
          description: Short human-readable summary
          example: Validation Error
        status:
          type: integer
          description: HTTP status code
          example: 400
        detail:
          type: string
          description: Human-readable explanation specific to this occurrence
          example: "Field 'description' must not be blank."
        instance:
          type: string
          format: uri
          description: URI reference identifying the specific occurrence
        timestamp:
          type: string
          format: date-time
        violations:
          type: array
          description: Field-level validation errors
          items:
            $ref: '#/components/schemas/FieldViolation'

    FieldViolation:
      type: object
      description: Individual field validation error
      properties:
        field:
          type: string
          example: description
        message:
          type: string
          example: must not be blank
        rejectedValue:
          type: [string, "null"]

  # ---------------------------------------------------------------------------
  # Responses
  # ---------------------------------------------------------------------------
  responses:
    BadRequest:
      description: "400 – Validation error (NFR-4)"
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetail'

    Unauthorized:
      description: "401 – Authentication required"
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetail'

    Forbidden:
      description: "403 – Insufficient permissions (NFR-3, role-based)"
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetail'

    NotFound:
      description: "404 – Resource not found"
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetail'

    Conflict:
      description: "409 – State conflict (invalid state transition per §4.1)"
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetail'

    UnprocessableEntity:
      description: "422 – Business rule violation (e.g., inactive provider)"
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetail'

    InternalServerError:
      description: "500 – Unexpected server error"
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetail'

  # ---------------------------------------------------------------------------
  # Security Schemes (NFR-3)
  # ---------------------------------------------------------------------------
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: "JWT token from external IdP (NFR-3)"

security:
  - bearerAuth: []
